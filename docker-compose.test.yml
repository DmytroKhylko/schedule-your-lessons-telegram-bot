services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env.test
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: schedule_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: schedule_bot_test
    volumes:
      - postgres_data_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d schedule_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_test:
